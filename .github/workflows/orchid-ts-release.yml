name: orchid-ts Release

on:
  push:
    branches: [ main ]

permissions:
  contents: write
  issues: write
  id-token: write
  packages: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Build
        run: npm run build
      - name: Typecheck
        run: npm run typecheck
      - name: Lint
        run: npm run lint
      - name: Test
        run: npm test
      - name: Test Coverage
        run: npm run test:coverage
      - name: Semantic Release
        run: npx semantic-release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Publish to npm
        if: ${{ !contains(github.event.head_commit.message, 'chore(release)') }}
        run: |
          VERSION=$(node -p "require('./package.json').version")
          if npm view "@orchid-ai/orchid@${VERSION}" version 2>/dev/null; then
            echo "Version ${VERSION} already published, skipping."
            exit 0
          fi
          ID_TOKEN=$(curl -sS -H "Authorization: Bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" \
            "${ACTIONS_ID_TOKEN_REQUEST_URL}&audience=npm:registry.npmjs.org" | jq -r .value)
          NPM_TOKEN=$(curl -sS -X POST \
            -H "Authorization: Bearer $ID_TOKEN" \
            "https://registry.npmjs.org/-/npm/v1/oidc/token/exchange/package/@orchid-ai%2Forchid" | jq -r .token)
          export NODE_AUTH_TOKEN="$NPM_TOKEN"
          npm publish --provenance --access public
